name: Build and Deploy
concurrency: build_and_deploy_${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: choice
        default: review
        options:
        - development
        - review
        - test
        #- preproduction
        #- production
      docker-image-tag:
        description: "Docker image tag to deploy (optional)"
        required: true
        type: string
      pull-request-number:
        description: "Pull request number (required for review environment)"
        required: false
        type: string
  push:
   branches:
    - main
  pull_request:
    branches:
    - main
    types: [opened, reopened, synchronize, labeled]

env:
  TERRAFORM_BASE: terraform/application
  HEALTHCHECK_CMD: 'health'

jobs:
  build:
    name: Build
    if: ${{ github.event_name != 'workflow_dispatch' }}
    env:
      DOCKER_REPOSITORY: ghcr.io/dfe-digital/education-provider-registry-web
    outputs:
      docker-image-tag: ${{ steps.build-image.outputs.tag }}
    permissions:
      packages: write
      pull-requests: write
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      name: Checkout

    - name: Inject token into NuGet.config
      run: |
        TOKEN="${{ secrets.GITHUB_TOKEN }}"
        sed -i "s|%GITHUB_TOKEN%|$TOKEN|g" NuGet.config

    - name: Build and push docker image
      id: build-image
      uses: DFE-Digital/github-actions/build-docker-image@0e3ff9f87329e3d8ace1fc4f175ddd1ea13c7af0
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        dockerfile-path: ./src/DfE.EducationProviderRegistry.Web.Mvc/Dockerfile
        context: ./src
        secret-files: nuget_config=./NuGet.config
        docker-repository: ${{ env.DOCKER_REPOSITORY }}
        max-cache: true
        reuse-cache: true
        snyk-token: ${{ secrets.SNYK_TOKEN }}
  test:
    name: Run tests
    if: ${{ github.event_name != 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    # This is a skeleton test job
    # It will need to be updated to set the environment and run required tests
    # The steps can be moved to a separate action if preferred

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: .NET Tool restore
      run: dotnet tool restore

    - name: Restore Dependencies
      run: dotnet restore --configfile NuGet.config
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_USERNAME: DFE-Digital

    - name: Run .NET Tests with coverage
      run: |
        dotnet test \
          --verbosity normal \
          --report-xunit-trx \
          --coverage \
          --coverage-output coverage.cobertura.xml \
          --coverage-output-format cobertura \
          --coverage-settings coverage.runsettings

    - name: Convert coverage to SonarQube format
      run: |
        dotnet tool run reportgenerator \
          -reports:**/TestResults/coverage.cobertura.xml \
          -targetdir:coverage-sonar \
          -reporttypes:SonarQube \
          -sourcedirs:.

    - name: Upload Sonar coverage report
      uses: actions/upload-artifact@v7
      with:
        name: sonar-coverage-report
        path: coverage-sonar/SonarQube.xml

    - name: SonarCloud scan
      if: github.actor != 'dependabot[bot]'
      uses: DFE-Digital/github-actions/sonarscan-dotnet@f55be113b82625ba997c4960aa93fd10ffa043ad
      with:
          sonarcloud-project-key: DFE-Digital_education-provider-registry-web
          sonarcloud-token: ${{ secrets.SONAR_TOKEN }}
          use-global-json: true
          coverage-report-path: coverage-sonar/SonarQube.xml

  deploy-review-app:
    name: Deployment To Review
    concurrency: deploy_review_${{ github.event.pull_request.number }}
    if: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'deploy') }}
    needs: [build]
    environment:
      name: review
      url: ${{ steps.deploy_review.outputs.environment_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write

    steps:
    - name: Deploy App to Review
      id: deploy_review
      uses: DFE-Digital/github-actions/deploy-to-aks@master
      with:
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        environment: review
        pr-number: ${{ github.event.pull_request.number }}
        sha: ${{ needs.build.outputs.docker-image-tag }}
        terraform-base: ${{ env.TERRAFORM_BASE }}
        healthcheck: ${{ env.HEALTHCHECK_CMD }}
        db-seed: false
        smoke-test: false
  #        gcp-wip: ${{ vars.GCP_WIP }}
  #        gcp-project-id: ${{ vars.GCP_PROJECT_ID }}

  deploy:
    name: Deploy environments
    if: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    environment:
      name: ${{ matrix.environment }}
      url: ${{ steps.deploy_app.outputs.environment_url }}
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write
    strategy:
      max-parallel: 1
      matrix:
        environment: [development,test] # [development,test,preproduction,production]

    steps:
    - name: Deploy app to ${{ matrix.environment }}
      id: deploy_app
      uses: DFE-Digital/github-actions/deploy-to-aks@master
      with:
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        environment: ${{ matrix.environment }}
        sha: ${{ needs.build.outputs.docker-image-tag }}
        terraform-base: ${{ env.TERRAFORM_BASE }}
        healthcheck: ${{ env.HEALTHCHECK_CMD }}
        teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
        smoke-test: false
        gcp-wip: ${{ vars.GCP_WIP }}
        gcp-project-id: ${{ vars.GCP_PROJECT_ID }}

  manual_deploy:
    name: Manual deploy
    if: ${{ github.event_name == 'workflow_dispatch' }}
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy_manual.outputs.environment_url }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      pull-requests: write

    steps:
    - name: Deploy app to ${{ inputs.environment }}
      id: deploy_manual
      uses: DFE-Digital/github-actions/deploy-to-aks@master
      with:
        azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
        azure-subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        environment: ${{ inputs.environment }}
        pr-number: ${{ inputs.pull-request-number }}
        sha: ${{ inputs.docker-image-tag }}
        terraform-base: ${{ env.TERRAFORM_BASE }}
        healthcheck: ${{ env.HEALTHCHECK_CMD }}
        teams-webhook-url: ${{ secrets.TEAMS_WEBHOOK_URL }}
        service: ${{ vars.TEAMS_MSG_SERVICE_NAME }}
        smoke-test: false
        db-seed: ${{ inputs.environment == 'review' && 'true' || 'false' }}
        gcp-wip: ${{ vars.GCP_WIP }}
        gcp-project-id: ${{ vars.GCP_PROJECT_ID }}

